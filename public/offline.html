<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>EcoPonto | Offline</title>
    <style>
      :root {
        color-scheme: light;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: "Segoe UI", system-ui, sans-serif;
        background: radial-gradient(circle at top left, #e7f8ea, #f8faf8 60%);
        color: #1c2a22;
      }

      main {
        max-width: 28rem;
        margin: 1.5rem;
        padding: 1.5rem;
        border-radius: 1rem;
        background: #ffffff;
        border: 1px solid #dce7df;
        box-shadow: 0 10px 30px rgba(31, 122, 57, 0.12);
      }

      h1 {
        margin-top: 0;
        margin-bottom: 0.75rem;
        font-size: 1.4rem;
      }

      p {
        margin: 0 0 1rem;
        line-height: 1.55;
      }

      a {
        display: inline-block;
        padding: 0.7rem 1rem;
        border-radius: 0.6rem;
        text-decoration: none;
        background: #1f7a39;
        color: #fff;
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Voce esta offline</h1>
      <p>
        O EcoPonto continua disponivel com conteudo salvo. Assim que a conexao
        voltar, os dados mais recentes serao sincronizados automaticamente.
      </p>
      <a href="/mapa">Tentar novamente</a>
    </main>
  </body>
</html>
